<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>FIRSTHAND — Conversation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT@0,9..144,300..900,0..100;1,9..144,300..900,0..100&family=Inter:wght@400;500;600;700&family=Newsreader:ital,opsz,wght@0,6..72,400..700;1,6..72,400..700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css" />
<style>
  .chat-wrap {
    max-width: 740px;
    margin: 0 auto;
    padding: 18px var(--gutter) 160px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  .chat-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
    margin-bottom: 28px;
    font-family: var(--read);
    font-size: 13px;
    color: var(--ink-mute);
  }
  .chat-top a {
    color: var(--ink-soft);
    border-bottom: 0;
    transition: color 160ms ease;
  }
  .chat-top a:hover { color: var(--ink); }
  .chat-top .meta-mid {
    font-family: var(--mono);
    font-size: 11.5px;
    color: var(--ink-mute);
    letter-spacing: 0.01em;
  }

  .chat-head {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0 0 18px;
    margin-bottom: 28px;
    border-bottom: 1px solid var(--rule);
  }
  .chat-mono {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--mono-bg, #E2D3B0);
    color: var(--mono-ink, #7B3A18);
    font-family: var(--sans);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.01em;
    flex-shrink: 0;
  }
  .chat-id {
    display: flex;
    align-items: baseline;
    gap: 10px;
    min-width: 0;
    flex: 1;
  }
  .chat-id .name {
    font-family: var(--serif);
    font-size: 18px;
    font-weight: 600;
    line-height: 1.2;
    letter-spacing: -0.01em;
    color: var(--ink);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .chat-id .sub {
    font-family: var(--read);
    font-size: 13px;
    color: var(--ink-mute);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    min-width: 0;
  }

  .chat-thread {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 28px;
    margin-bottom: 32px;
  }
  .turn {
    display: flex;
    flex-direction: column;
  }
  .turn .who { display: none; }
  .turn .body {
    font-family: var(--read);
    font-size: 15.5px;
    line-height: 1.65;
    color: var(--ink);
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  .turn.you {
    align-self: flex-end;
    max-width: 80%;
  }
  .turn.you .body {
    background: var(--paper-card, #F5F1EA);
    padding: 11px 16px;
    border-radius: 18px;
    border: 1px solid var(--rule);
  }
  .turn.them {
    align-self: stretch;
    max-width: 100%;
  }
  .turn.them .body {
    padding: 0;
    background: transparent;
    border: none;
  }

  .chat-empty {
    color: var(--ink-mute);
    align-self: center;
    padding: 64px 0;
    font-family: var(--read);
    font-size: 14px;
    font-style: italic;
  }

  .chat-compose {
    position: sticky;
    bottom: 16px;
    background: var(--paper, #FBF8F2);
    border: 1px solid var(--rule);
    border-radius: 22px;
    padding: 10px 10px 10px 18px;
    display: flex;
    gap: 8px;
    align-items: flex-end;
    box-shadow: 0 10px 28px -18px rgba(26, 26, 26, 0.22);
    transition: border-color 160ms ease, box-shadow 160ms ease;
  }
  .chat-compose:focus-within {
    border-color: var(--ink-soft);
    box-shadow: 0 12px 32px -18px rgba(26, 26, 26, 0.28);
  }
  .chat-compose textarea {
    flex: 1;
    border: none;
    background: transparent;
    font-family: var(--read);
    font-size: 15.5px;
    line-height: 1.5;
    color: var(--ink);
    resize: none;
    outline: none;
    min-height: 28px;
    max-height: 200px;
    padding: 6px 0;
  }
  .chat-compose textarea::placeholder { color: var(--ink-mute); }
  .chat-compose button {
    font-family: var(--read);
    font-size: 13.5px;
    font-weight: 600;
    background: var(--ink);
    color: #fff;
    border: 1px solid var(--ink);
    padding: 8px 14px;
    border-radius: 999px;
    cursor: pointer;
    transition: opacity 160ms ease, transform 80ms ease;
    flex-shrink: 0;
  }
  .chat-compose button:hover { opacity: 0.88; }
  .chat-compose button:active { transform: scale(0.97); }
  .chat-compose button:disabled { opacity: 0.35; cursor: not-allowed; }

  .chat-pending {
    font-family: var(--read);
    font-size: 14px;
    color: var(--ink-mute);
    align-self: flex-start;
    padding: 4px 0;
    font-style: italic;
  }
  .chat-error {
    font-family: var(--read);
    color: #B5421F;
    font-size: 13.5px;
    padding: 6px 12px;
    background: rgba(181, 66, 31, 0.06);
    border-radius: 8px;
    align-self: flex-start;
    max-width: 100%;
  }

  @media (max-width: 640px) {
    .chat-wrap { padding-bottom: 140px; }
    .chat-id { flex-direction: column; align-items: flex-start; gap: 2px; }
    .chat-id .name { font-size: 16px; }
    .chat-id .sub { font-size: 12.5px; }
    .turn.you { max-width: 92%; }
    .chat-compose { bottom: 10px; }
  }
</style>
</head>
<body>

<div class="chat-wrap">
  <div class="chat-top">
    <a href="/">← Directory</a>
    <span class="meta-mid" data-source-line>—</span>
    <span data-session></span>
  </div>

  <header class="chat-head">
    <div class="chat-mono" data-mono>··</div>
    <div class="chat-id">
      <span class="name" data-name>Loading…</span>
      <span class="sub" data-sub>—</span>
    </div>
  </header>

  <div class="chat-thread" data-thread>
    <div class="chat-empty" data-empty>Say something to start the conversation.</div>
  </div>

  <form class="chat-compose" data-form>
    <textarea data-input placeholder="Ask a question. Shift+Enter for newline." rows="1"></textarea>
    <button type="submit" data-send>Send →</button>
  </form>
</div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";
(async () => {
  // --- auth bootstrap ---
  const here = location.pathname + location.search;
  const goLogin = () => location.replace(`/login.html?next=${encodeURIComponent(here)}`);

  let supabase = null;
  let session = null;
  try {
    const cfg = await (await fetch("/auth/config")).json();
    if (!cfg.supabase_url || !cfg.supabase_anon_key) {
      document.querySelector("[data-session]").textContent = "auth not configured";
    } else {
      supabase = createClient(cfg.supabase_url, cfg.supabase_anon_key);
      ({ data: { session } } = await supabase.auth.getSession());
    }
  } catch (_) { /* fall through */ }
  if (!session) { goLogin(); return; }

  const sessionEl = document.querySelector("[data-session]");
  sessionEl.innerHTML = "";
  const who = document.createElement("span");
  who.textContent = session.user.email || "signed in";
  const sep = document.createTextNode(" · ");
  const out = document.createElement("a");
  out.href = "#"; out.textContent = "sign out";
  out.addEventListener("click", async (e) => {
    e.preventDefault();
    await supabase.auth.signOut();
    goLogin();
  });
  sessionEl.append(who, sep, out);

  const authFetch = async (url, opts = {}) => {
    const { data: { session: cur } } = await supabase.auth.getSession();
    if (!cur) { goLogin(); throw new Error("not signed in"); }
    const headers = new Headers(opts.headers || {});
    headers.set("Authorization", `Bearer ${cur.access_token}`);
    const res = await fetch(url, { ...opts, headers });
    if (res.status === 401) { goLogin(); throw new Error("unauthorized"); }
    return res;
  };

  const PALETTE = [
    ["#F7F7F2", "#111827"],
    ["#EEF5FF", "#1D4ED8"],
    ["#FFF3EA", "#C2410C"],
    ["#EEF8F3", "#047857"],
    ["#F4F1FF", "#6D28D9"],
    ["#F8FAFC", "#334155"],
    ["#FFF7ED", "#9A3412"],
    ["#EFF6FF", "#1E40AF"],
  ];
  const initials = (name) =>
    (name || "").split(/\s+/).filter(Boolean).slice(0, 2).map(p => p[0].toUpperCase()).join("") || "··";
  const hash = (s) => {
    let h = 0; for (const ch of s || "") h = (h * 31 + ch.charCodeAt(0)) | 0;
    return Math.abs(h);
  };

  const params = new URLSearchParams(location.search);
  const id = params.get("id");
  if (!id) {
    document.querySelector("[data-name]").textContent = "No founder selected.";
    return;
  }

  const thread = document.querySelector("[data-thread]");
  const emptyEl = document.querySelector("[data-empty]");
  const input = document.querySelector("[data-input]");
  const form = document.querySelector("[data-form]");
  const sendBtn = document.querySelector("[data-send]");

  const renderTurn = (role, content) => {
    if (emptyEl && !emptyEl.hidden) emptyEl.hidden = true;
    const div = document.createElement("div");
    div.className = "turn " + (role === "user" ? "you" : "them");
    const who = document.createElement("span");
    who.className = "who";
    who.textContent = role === "user" ? "You" : (window.__founderName || "Them");
    const body = document.createElement("div");
    body.className = "body";
    body.textContent = content;
    div.appendChild(who);
    div.appendChild(body);
    thread.appendChild(div);
    window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" });
    return div;
  };

  // Load founder metadata
  try {
    const res = await fetch(`/founders/${encodeURIComponent(id)}`);
    if (res.ok) {
      const f = await res.json();
      window.__founderName = f.name;
      document.querySelector("[data-name]").textContent = f.name;
      const subBits = [];
      if (f.company_name) subBits.push(f.company_name);
      if (f.notes) subBits.push(f.notes);
      document.querySelector("[data-sub]").textContent = subBits.join(" · ") || "Founder dossier";
      document.querySelector("[data-source-line]").textContent =
        `${f.source_count} source${f.source_count === 1 ? "" : "s"} in the sandbox`;
      const [bg, ink] = PALETTE[hash(f.id) % PALETTE.length];
      const mono = document.querySelector("[data-mono]");
      mono.style.setProperty("--mono-bg", bg);
      mono.style.setProperty("--mono-ink", ink);
      mono.style.background = bg;
      mono.style.color = ink;
      mono.textContent = initials(f.name);
      document.title = `FIRSTHAND — ${f.name}`;
    } else {
      document.querySelector("[data-name]").textContent = "Founder not found.";
      return;
    }
  } catch (err) {
    document.querySelector("[data-name]").textContent = "Could not load founder.";
    return;
  }

  // Hydrate prior messages
  try {
    const res = await authFetch(`/founders/${encodeURIComponent(id)}/messages`);
    if (res.ok) {
      const { messages } = await res.json();
      if (messages && messages.length) {
        emptyEl.hidden = true;
        for (const m of messages) renderTurn(m.role, m.content);
      }
    }
  } catch (_) { /* ignore */ }

  // Autosize textarea
  const autosize = () => {
    input.style.height = "auto";
    input.style.height = Math.min(input.scrollHeight, 200) + "px";
  };
  input.addEventListener("input", autosize);

  const send = async () => {
    const message = input.value.trim();
    if (!message) return;
    input.value = "";
    autosize();
    renderTurn("user", message);
    sendBtn.disabled = true;

    const pending = document.createElement("div");
    pending.className = "chat-pending";
    pending.textContent = "thinking…";
    thread.appendChild(pending);

    try {
      const res = await authFetch(`/founders/${encodeURIComponent(id)}/chat`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message }),
      });
      pending.remove();
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        const detail = err.detail;
        let msg;
        if (typeof detail === "string") msg = detail;
        else if (detail) msg = JSON.stringify(detail);
        else msg = `Error ${res.status}`;
        const e = document.createElement("div");
        e.className = "chat-error";
        e.textContent = msg;
        thread.appendChild(e);
      } else {
        const { reply } = await res.json();
        renderTurn("assistant", reply);
      }
    } catch (err) {
      pending.remove();
      const e = document.createElement("div");
      e.className = "chat-error";
      e.textContent = "Network error.";
      thread.appendChild(e);
    } finally {
      sendBtn.disabled = false;
      input.focus();
    }
  };

  form.addEventListener("submit", (e) => { e.preventDefault(); send(); });
  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  });
  input.focus();
})();
</script>
</body>
</html>
