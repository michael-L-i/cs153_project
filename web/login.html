<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>FIRSTHAND — Sign in</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT@0,9..144,300..900,0..100;1,9..144,300..900,0..100&family=Inter:wght@400;500;600;700&family=Newsreader:ital,opsz,wght@0,6..72,400..700;1,6..72,400..700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css" />
<style>
  .auth-wrap {
    max-width: 420px;
    margin: 0 auto;
    padding: clamp(56px, 10vh, 120px) var(--gutter) 80px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .auth-top {
    font-size: 14px;
    color: var(--ink-mute);
    margin-bottom: 32px;
  }
  .auth-top a { color: var(--ink-soft); transition: color 160ms ease; }
  .auth-top a:hover { color: var(--accent); }
  .auth-card { padding: 0; }
  .auth-title {
    font-family: var(--serif);
    font-size: clamp(30px, 4vw, 38px);
    font-weight: 500;
    letter-spacing: -0.02em;
    line-height: 1.1;
    margin: 0 0 8px;
    color: var(--ink);
  }
  .auth-sub {
    font-size: 15px;
    color: var(--ink-mute);
    margin-bottom: 32px;
  }
  .auth-field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
  .auth-field label {
    font-size: 13.5px;
    font-weight: 500;
    color: var(--ink-soft);
  }
  .auth-field input {
    font-family: var(--sans);
    font-size: 16px;
    color: var(--ink);
    background: var(--paper);
    border: 1px solid var(--rule-strong);
    border-radius: 8px;
    padding: 12px 14px;
    outline: none;
    transition: border-color 160ms ease, box-shadow 160ms ease;
  }
  .auth-field input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(181, 66, 31, 0.15);
  }
  .auth-actions {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    margin-top: 24px;
  }
  .auth-actions button[data-submit] {
    font-family: var(--sans);
    font-size: 15px;
    font-weight: 500;
    background: var(--accent);
    color: #fff;
    border: 1px solid var(--accent);
    border-radius: 8px;
    padding: 12px 22px;
    cursor: pointer;
    transition: background 160ms ease;
  }
  .auth-actions button[data-submit]:hover { background: var(--accent-deep); }
  .auth-actions button[data-submit][disabled] { opacity: 0.5; cursor: not-allowed; }
  .auth-toggle {
    background: none;
    border: none;
    font-family: var(--sans);
    font-size: 14px;
    color: var(--ink-mute);
    cursor: pointer;
    padding: 0;
    transition: color 160ms ease;
  }
  .auth-toggle:hover { color: var(--accent); }
  .auth-msg {
    margin-top: 16px;
    font-size: 13.5px;
    color: var(--accent);
    min-height: 1.4em;
  }
  .auth-msg.ok { color: var(--sage); }
  .auth-confirm { display: none; }
  .auth-confirm.show { display: block; }
  .auth-confirm .glyph {
    font-size: 13.5px;
    color: var(--ink-mute);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
  }
  .auth-confirm .glyph .dot {
    display: inline-block;
    width: 7px; height: 7px;
    background: var(--sage);
    border-radius: 50%;
    margin-right: 10px;
    animation: pulse 1.4s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.35; }
    50%      { opacity: 1; }
  }
  .auth-confirm p {
    font-family: var(--sans);
    font-size: 15px;
    line-height: 1.6;
    color: var(--ink-soft);
    margin: 0 0 14px;
  }
  .auth-confirm .target {
    font-family: var(--mono);
    font-size: 13.5px;
    background: var(--paper-card);
    border-radius: 6px;
    padding: 10px 12px;
    display: inline-block;
    margin-bottom: 18px;
    color: var(--ink);
  }
  .auth-confirm .row {
    display: flex; align-items: center; gap: 18px;
    margin-top: 16px;
  }
  .auth-confirm .ghost {
    background: none;
    border: none;
    font-family: var(--sans);
    font-size: 14px;
    color: var(--ink-mute);
    cursor: pointer;
    padding: 0;
    transition: color 160ms ease;
  }
  .auth-confirm .ghost:hover { color: var(--accent); }
  .auth-confirm .ghost[disabled] { opacity: 0.5; cursor: not-allowed; }
  .auth-wrap {
    max-width: 460px;
  }
  .auth-top {
    font-family: var(--read);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0;
    text-transform: none;
  }
  .auth-top a {
    border-bottom: 0;
    color: var(--ink);
  }
  .auth-card {
    padding: 28px;
    border: 1px solid var(--rule);
    border-radius: 8px;
    background: var(--paper-card);
    box-shadow: 0 28px 70px -50px rgba(17, 24, 39, 0.55);
  }
  .auth-title {
    font-family: var(--serif);
    font-weight: 650;
    letter-spacing: -0.025em;
  }
  .auth-sub,
  .auth-field label,
  .auth-actions button,
  .auth-toggle,
  .auth-msg,
  .auth-confirm .glyph,
  .auth-confirm .ghost {
    font-family: var(--read);
    letter-spacing: 0;
    text-transform: none;
  }
  .auth-sub {
    font-size: 14px;
    font-weight: 600;
  }
  .auth-field label {
    font-size: 13px;
    font-weight: 700;
  }
  .auth-field input {
    font-family: var(--read);
    border-radius: 6px;
    background: #FFFFFF;
  }
  .auth-actions {
    flex-wrap: wrap;
  }
  .auth-actions button {
    border-radius: 999px;
    font-size: 14px;
    font-weight: 700;
    padding: 11px 17px;
  }
  .auth-toggle,
  .auth-confirm .ghost {
    border-bottom: 0;
    font-size: 13px;
    font-weight: 700;
  }
  .auth-confirm p {
    font-family: var(--read);
  }
  .auth-confirm .target {
    font-family: var(--read);
    border-radius: 6px;
    background: #FFFFFF;
  }
</style>
</head>
<body>

<div class="auth-wrap">
  <div class="auth-top"><a href="/">← Firsthand</a></div>
  <div class="auth-card">
    <h1 class="auth-title" data-title>Sign in</h1>
    <div class="auth-sub" data-sub>To continue to your conversations</div>

    <form data-form>
      <div class="auth-field">
        <label for="email">Email</label>
        <input id="email" type="email" autocomplete="email" required />
      </div>
      <div class="auth-field">
        <label for="password">Password</label>
        <input id="password" type="password" autocomplete="current-password" minlength="6" required />
      </div>
      <div class="auth-actions">
        <button type="submit" data-submit>Sign in →</button>
        <button type="button" class="auth-toggle" data-toggle>Need an account? Sign up</button>
      </div>
      <div class="auth-msg" data-msg></div>
    </form>

    <div class="auth-confirm" data-confirm>
      <div class="glyph"><span class="dot"></span>Waiting for confirmation</div>
      <p>We sent a sign-in link to:</p>
      <div class="target" data-confirm-email></div>
      <p>Open it from this device and you'll be signed in automatically — no need to come back here.</p>
      <div class="row">
        <button type="button" class="ghost" data-resend>Resend email</button>
        <button type="button" class="ghost" data-restart>Use a different email</button>
      </div>
      <div class="auth-msg" data-confirm-msg></div>
    </div>
  </div>
</div>

<script type="module">
  import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

  const cfgRes = await fetch("/auth/config");
  const cfg = await cfgRes.json();
  if (!cfg.supabase_url || !cfg.supabase_anon_key) {
    document.querySelector("[data-msg]").textContent =
      "Auth is not configured on the server (SUPABASE_URL / SUPABASE_ANON_KEY missing).";
    document.querySelector("[data-submit]").disabled = true;
    throw new Error("supabase config missing");
  }
  const supabase = createClient(cfg.supabase_url, cfg.supabase_anon_key);
  window.__supabase = supabase;

  // already signed in? bounce to next
  const params = new URLSearchParams(location.search);
  const next = params.get("next") || "/";
  const { data: { session } } = await supabase.auth.getSession();
  if (session) { location.replace(next); }

  let mode = "signin";
  const title = document.querySelector("[data-title]");
  const sub = document.querySelector("[data-sub]");
  const submit = document.querySelector("[data-submit]");
  const toggle = document.querySelector("[data-toggle]");
  const msg = document.querySelector("[data-msg]");
  const pwd = document.getElementById("password");
  const form = document.querySelector("[data-form]");
  const confirm = document.querySelector("[data-confirm]");
  const confirmEmail = document.querySelector("[data-confirm-email]");
  const confirmMsg = document.querySelector("[data-confirm-msg]");
  const resendBtn = document.querySelector("[data-resend]");
  const restartBtn = document.querySelector("[data-restart]");

  // Auto-redirect the moment Supabase reports a live session (from email link in
  // another tab, or any other source) — no polling needed.
  supabase.auth.onAuthStateChange((event, s) => {
    if (s && (event === "SIGNED_IN" || event === "TOKEN_REFRESHED")) {
      location.replace(next);
    }
  });

  const showConfirmView = (email) => {
    confirmEmail.textContent = email;
    form.style.display = "none";
    confirm.classList.add("show");
    title.textContent = "Check your inbox";
    sub.textContent = "One last step to start your conversations";
  };
  const showFormView = () => {
    confirm.classList.remove("show");
    form.style.display = "";
    confirmMsg.textContent = "";
    setMode("signin");
  };
  restartBtn.addEventListener("click", showFormView);
  resendBtn.addEventListener("click", async () => {
    resendBtn.disabled = true;
    confirmMsg.classList.remove("ok");
    confirmMsg.textContent = "…";
    try {
      const { error } = await supabase.auth.resend({
        type: "signup",
        email: confirmEmail.textContent,
      });
      if (error) throw error;
      confirmMsg.classList.add("ok");
      confirmMsg.textContent = "Sent again. Check your inbox (and spam).";
    } catch (err) {
      confirmMsg.textContent = err.message || "Could not resend.";
    } finally {
      setTimeout(() => { resendBtn.disabled = false; }, 4000);
    }
  });

  const setMode = (m) => {
    mode = m;
    if (m === "signup") {
      title.textContent = "Create account";
      sub.textContent = "Start your founder conversations";
      submit.textContent = "Sign up →";
      toggle.textContent = "Already have an account? Sign in";
      pwd.setAttribute("autocomplete", "new-password");
    } else {
      title.textContent = "Sign in";
      sub.textContent = "To continue to your conversations";
      submit.textContent = "Sign in →";
      toggle.textContent = "Need an account? Sign up";
      pwd.setAttribute("autocomplete", "current-password");
    }
    msg.textContent = "";
    msg.classList.remove("ok");
  };
  toggle.addEventListener("click", () => setMode(mode === "signin" ? "signup" : "signin"));

  document.querySelector("[data-form]").addEventListener("submit", async (e) => {
    e.preventDefault();
    const email = document.getElementById("email").value.trim();
    const password = pwd.value;
    submit.disabled = true;
    msg.classList.remove("ok");
    msg.textContent = "…";
    try {
      if (mode === "signup") {
        const { data, error } = await supabase.auth.signUp({
          email,
          password,
          options: { emailRedirectTo: `${location.origin}/login.html?next=${encodeURIComponent(next)}` },
        });
        if (error) {
          // Supabase returns this when confirmations are OFF and the email already exists.
          if (/already registered|already exists|already been/i.test(error.message)) {
            setMode("signin");
            pwd.value = "";
            msg.classList.add("ok");
            msg.textContent = `An account for ${email} already exists. Sign in below.`;
            return;
          }
          throw error;
        }
        // With confirmations ON, Supabase signals an existing email by returning a
        // user with an empty identities[] (and no session). Treat that as "exists".
        const identities = data.user && data.user.identities;
        if (!data.session && Array.isArray(identities) && identities.length === 0) {
          setMode("signin");
          pwd.value = "";
          msg.classList.add("ok");
          msg.textContent = `An account for ${email} already exists. Sign in below.`;
          return;
        }
        if (data.session) {
          // Email confirmation is disabled — session is live, go straight in.
          location.replace(next);
          return;
        }
        showConfirmView(email);
        return;
      } else {
        const { error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) throw error;
        location.replace(next);
      }
    } catch (err) {
      msg.textContent = err.message || "Something went wrong.";
    } finally {
      submit.disabled = false;
    }
  });
</script>
</body>
</html>
