<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>FIRSTHAND — Conversation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;500&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css" />
<style>
  .chat-wrap {
    max-width: 760px;
    margin: 0 auto;
    padding: clamp(24px, 4vw, 40px) var(--gutter) 140px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  .chat-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 32px;
    font-size: 13.5px;
    color: var(--ink-mute);
  }
  .chat-top a { color: var(--ink-soft); transition: color 160ms ease; }
  .chat-top a:hover { color: var(--accent); }
  .chat-top .meta-mid { font-family: var(--mono); font-size: 12px; }
  .chat-head {
    display: grid;
    grid-template-columns: 56px 1fr;
    gap: 18px;
    align-items: center;
    padding: 0 0 32px;
    margin-bottom: 32px;
    border-bottom: 1px solid var(--rule);
  }
  .chat-mono {
    width: 56px; height: 56px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    background: var(--mono-bg, #E2D3B0);
    color: var(--mono-ink, #7B3A18);
    font-family: var(--sans);
    font-size: 17px;
    font-weight: 600;
    letter-spacing: 0.01em;
  }
  .chat-id .name {
    display: block;
    font-family: var(--serif);
    font-size: clamp(26px, 3.6vw, 34px);
    font-weight: 500;
    line-height: 1.1;
    letter-spacing: -0.015em;
    color: var(--ink);
  }
  .chat-id .sub {
    display: block;
    margin-top: 4px;
    font-size: 14px;
    color: var(--ink-mute);
  }
  .chat-thread {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 24px;
    margin-bottom: 32px;
  }
  .turn {
    display: flex;
    flex-direction: column;
    max-width: 86%;
  }
  .turn .who {
    font-size: 12.5px;
    font-weight: 500;
    color: var(--ink-mute);
    margin-bottom: 6px;
  }
  .turn .body {
    font-family: var(--sans);
    font-size: 16px;
    line-height: 1.6;
    color: var(--ink);
    white-space: pre-wrap;
  }
  .turn.you { align-self: flex-end; }
  .turn.you .who { text-align: right; }
  .turn.you .body {
    background: var(--paper-card);
    padding: 12px 16px;
    border-radius: 14px;
    border-bottom-right-radius: 4px;
  }
  .turn.them { align-self: flex-start; }
  .turn.them .body {
    padding: 0;
  }
  .chat-empty {
    color: var(--ink-mute);
    align-self: center;
    padding: 48px 0;
    font-size: 15px;
  }
  .chat-compose {
    position: sticky;
    bottom: 20px;
    background: var(--paper);
    border: 1px solid var(--rule-strong);
    border-radius: 14px;
    padding: 10px 10px 10px 16px;
    display: flex;
    gap: 10px;
    align-items: flex-end;
    box-shadow: 0 8px 24px -16px rgba(26, 26, 26, 0.25);
    transition: border-color 160ms ease, box-shadow 160ms ease;
  }
  .chat-compose:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(181, 66, 31, 0.12);
  }
  .chat-compose textarea {
    flex: 1;
    border: none;
    background: transparent;
    font-family: var(--sans);
    font-size: 16px;
    line-height: 1.5;
    color: var(--ink);
    resize: none;
    outline: none;
    min-height: 28px;
    max-height: 200px;
    padding: 6px 0;
  }
  .chat-compose textarea::placeholder { color: var(--ink-mute); }
  .chat-compose button {
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 500;
    background: var(--accent);
    color: #fff;
    border: 1px solid var(--accent);
    padding: 9px 16px;
    border-radius: 10px;
    cursor: pointer;
    transition: background 160ms ease;
  }
  .chat-compose button:hover { background: var(--accent-deep); }
  .chat-compose button:disabled { opacity: 0.5; cursor: not-allowed; }
  .chat-pending {
    font-size: 13px;
    color: var(--ink-mute);
    align-self: flex-start;
    padding: 6px 0;
    font-style: italic;
  }
  .chat-error {
    color: var(--accent);
    font-size: 13.5px;
    padding: 6px 0;
  }
</style>
</head>
<body>

<div class="chat-wrap">
  <div class="chat-top">
    <a href="/">← Directory</a>
    <span class="meta-mid" data-source-line>—</span>
    <span data-session></span>
  </div>

  <header class="chat-head">
    <div class="chat-mono" data-mono>··</div>
    <div class="chat-id">
      <span class="name" data-name>Loading…</span>
      <span class="sub" data-sub>—</span>
    </div>
  </header>

  <div class="chat-thread" data-thread>
    <div class="chat-empty" data-empty>Say something to start the conversation.</div>
  </div>

  <form class="chat-compose" data-form>
    <textarea data-input placeholder="Ask a question. Shift+Enter for newline." rows="1"></textarea>
    <button type="submit" data-send>Send →</button>
  </form>
</div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";
(async () => {
  // --- auth bootstrap ---
  const here = location.pathname + location.search;
  const goLogin = () => location.replace(`/login.html?next=${encodeURIComponent(here)}`);

  let supabase = null;
  let session = null;
  try {
    const cfg = await (await fetch("/auth/config")).json();
    if (!cfg.supabase_url || !cfg.supabase_anon_key) {
      document.querySelector("[data-session]").textContent = "auth not configured";
    } else {
      supabase = createClient(cfg.supabase_url, cfg.supabase_anon_key);
      ({ data: { session } } = await supabase.auth.getSession());
    }
  } catch (_) { /* fall through */ }
  if (!session) { goLogin(); return; }

  const sessionEl = document.querySelector("[data-session]");
  sessionEl.innerHTML = "";
  const who = document.createElement("span");
  who.textContent = session.user.email || "signed in";
  const sep = document.createTextNode(" · ");
  const out = document.createElement("a");
  out.href = "#"; out.textContent = "sign out";
  out.addEventListener("click", async (e) => {
    e.preventDefault();
    await supabase.auth.signOut();
    goLogin();
  });
  sessionEl.append(who, sep, out);

  const authFetch = async (url, opts = {}) => {
    const { data: { session: cur } } = await supabase.auth.getSession();
    if (!cur) { goLogin(); throw new Error("not signed in"); }
    const headers = new Headers(opts.headers || {});
    headers.set("Authorization", `Bearer ${cur.access_token}`);
    const res = await fetch(url, { ...opts, headers });
    if (res.status === 401) { goLogin(); throw new Error("unauthorized"); }
    return res;
  };

  const PALETTE = [
    ["#E2D3B0", "#7B3A18"],
    ["#D8E0CC", "#3F4F2D"],
    ["#EFD9C8", "#9C3B1B"],
    ["#D5D8E0", "#2E3B5A"],
    ["#E5DAC2", "#6E5320"],
    ["#DCD2C0", "#5A4422"],
    ["#CDD8D2", "#2C4A3D"],
    ["#E8D6D0", "#8C3232"],
  ];
  const initials = (name) =>
    (name || "").split(/\s+/).filter(Boolean).slice(0, 2).map(p => p[0].toUpperCase()).join("") || "··";
  const hash = (s) => {
    let h = 0; for (const ch of s || "") h = (h * 31 + ch.charCodeAt(0)) | 0;
    return Math.abs(h);
  };

  const params = new URLSearchParams(location.search);
  const id = params.get("id");
  if (!id) {
    document.querySelector("[data-name]").textContent = "No founder selected.";
    return;
  }

  const thread = document.querySelector("[data-thread]");
  const emptyEl = document.querySelector("[data-empty]");
  const input = document.querySelector("[data-input]");
  const form = document.querySelector("[data-form]");
  const sendBtn = document.querySelector("[data-send]");

  const renderTurn = (role, content) => {
    if (emptyEl && !emptyEl.hidden) emptyEl.hidden = true;
    const div = document.createElement("div");
    div.className = "turn " + (role === "user" ? "you" : "them");
    const who = document.createElement("span");
    who.className = "who";
    who.textContent = role === "user" ? "You" : (window.__founderName || "Them");
    const body = document.createElement("div");
    body.className = "body";
    body.textContent = content;
    div.appendChild(who);
    div.appendChild(body);
    thread.appendChild(div);
    window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" });
    return div;
  };

  // Load founder metadata
  try {
    const res = await fetch(`/founders/${encodeURIComponent(id)}`);
    if (res.ok) {
      const f = await res.json();
      window.__founderName = f.name;
      document.querySelector("[data-name]").textContent = f.name;
      const subBits = [];
      if (f.company_name) subBits.push(f.company_name);
      if (f.notes) subBits.push(f.notes);
      document.querySelector("[data-sub]").textContent = subBits.join(" · ") || "Founder dossier";
      document.querySelector("[data-source-line]").textContent =
        `${f.source_count} source${f.source_count === 1 ? "" : "s"} in the sandbox`;
      const [bg, ink] = PALETTE[hash(f.id) % PALETTE.length];
      const mono = document.querySelector("[data-mono]");
      mono.style.setProperty("--mono-bg", bg);
      mono.style.setProperty("--mono-ink", ink);
      mono.style.background = bg;
      mono.style.color = ink;
      mono.textContent = initials(f.name);
      document.title = `FIRSTHAND — ${f.name}`;
    } else {
      document.querySelector("[data-name]").textContent = "Founder not found.";
      return;
    }
  } catch (err) {
    document.querySelector("[data-name]").textContent = "Could not load founder.";
    return;
  }

  // Hydrate prior messages
  try {
    const res = await authFetch(`/founders/${encodeURIComponent(id)}/messages`);
    if (res.ok) {
      const { messages } = await res.json();
      if (messages && messages.length) {
        emptyEl.hidden = true;
        for (const m of messages) renderTurn(m.role, m.content);
      }
    }
  } catch (_) { /* ignore */ }

  // Autosize textarea
  const autosize = () => {
    input.style.height = "auto";
    input.style.height = Math.min(input.scrollHeight, 200) + "px";
  };
  input.addEventListener("input", autosize);

  const send = async () => {
    const message = input.value.trim();
    if (!message) return;
    input.value = "";
    autosize();
    renderTurn("user", message);
    sendBtn.disabled = true;

    const pending = document.createElement("div");
    pending.className = "chat-pending";
    pending.textContent = "thinking…";
    thread.appendChild(pending);

    try {
      const res = await authFetch(`/founders/${encodeURIComponent(id)}/chat`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message }),
      });
      pending.remove();
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        const e = document.createElement("div");
        e.className = "chat-error";
        e.textContent = err.detail || `Error ${res.status}`;
        thread.appendChild(e);
      } else {
        const { reply } = await res.json();
        renderTurn("assistant", reply);
      }
    } catch (err) {
      pending.remove();
      const e = document.createElement("div");
      e.className = "chat-error";
      e.textContent = "Network error.";
      thread.appendChild(e);
    } finally {
      sendBtn.disabled = false;
      input.focus();
    }
  };

  form.addEventListener("submit", (e) => { e.preventDefault(); send(); });
  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  });
  input.focus();
})();
</script>
</body>
</html>
